name: Python Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_test:
    name: Code Quality & Test Suite
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Ingestion Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest numpy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Linting and Code Style Checks (Ruff)
      run: ruff check .

    - name: Verify Code Formatting Alignment
      run: ruff format --check .

    - name: Execute Asynchronous Test Suite
      run: pytest --verbose